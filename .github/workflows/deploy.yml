name: Deploy Flutter web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, нужные для публикации в GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускаем две публикации одновременно.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.3
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # base-href = "/имя-репозитория/" — нужно для project-страниц
      # вида username.github.io/имя-репозитория. Подставляется автоматически.
      - name: Build web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
