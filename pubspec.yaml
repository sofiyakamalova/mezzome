name: mezzome
description: MEZZOME Kitchen OS — Flutter client.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1
  retrofit: 4.4.2

  # Storage
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1

  # Serialization
  json_annotation: ^4.9.0

  # Localization
  easy_localization: ^3.0.7
  intl: ^0.20.2
  shared_preferences: ^2.5.3

  # Logging
  logger: ^2.5.0

  # Charts & files
  fl_chart: ^0.70.2
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  another_flushbar: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.15
  retrofit_generator: 9.1.9
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
